<body class="ai-page">
    <div class="ai-navigation">

    <div class = "prompt-name">
        <p>Prompt</p>
    </div>

    <div class = "spotify-link">
        <p>Click here to check out my spotify profile: <a href="https://open.spotify.com/user/axr5869">Spotify Profile</a></p>
    </div>
       
    <div class = "textbox">
        <textarea readonly>
        "Given this starter code, the task is for you to create me a completely AI-generated page for my website. I want the theme to be Spotify-related where it includes Spotify playlists, tracks, artists, songs, most listened to songs, etc. in a visual manner with embedding of playlists. I have included one playlist embedded as an example in my starter code, but I want more of that. Resize everything to allow everything to fit on the page. I want you to add a cool color scheme with a background image. I want an HTML file and CSS file."

        "This is a good start, I want a better and different color scheme for the page, change it."

        "I have CSS styles for my other pages' navigation bar that use the same naming system as .navigation and .navigation a, and etc. This is messing up the others. I want the other HTML pages to be the same as they are and for the AI page to have a different nav bar and different everything. Please fix it so the changes in the AI page don't mess up the other pages."

        "I want the nav bar to have Home on the left then Projects, Qualifications, Services, and Personal Dashboard."

        "Keep the same HTML, just change the CSS to have a completely different color set and style layout."

        "I don't like this color. Change the colors and make it look cooler."

        "Change the layout setup, like the 'Explore Your Favorite Music' location, change it and position everything differently."

        "I don't want the 'Explore Your Favorite Music' in that location with its own space. Change it."

        "Delete the 'Explore Your Favorite Music' part and replace that space with something else."

        "Give me all the prompts I gave you in a bullet point list."
        </textarea>
    </div>

    <section class="playlist-section">
        <div class="playlist-container">
            <!-- <h2>Featured Playlists</h2> -->
